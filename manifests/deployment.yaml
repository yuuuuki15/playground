apiVersion: apps/v1
kind: Deployment
metadata:
    name: wil-playground
    namespace: dev
    labels:
        app: playground
spec:
    replicas: 1
    selector:
        matchLabels:
            app: playground
    template:
        metadata:
            labels:
                app: playground
        spec:
            containers:
                - name: playground
                  image: wil42/playground:v1
                  ports:
                    - containerPort: 8888
                      name: http-playground-svc
